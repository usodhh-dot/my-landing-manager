<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>পেজ তালিকা</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>তৈরি হওয়া লাইভ পেজসমূহ</h2>
            <a href="/dashboard" class="btn btn-primary">নতুন পেজ তৈরি</a>
        </div>
        <div class="card shadow">
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>নাম</th>
                            <th>পেজ আইডি</th>
                            <th>লাইভ লিংক</th>
                            <th>অ্যাকশন</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for page in pages %}
                        <tr>
                            <td>{{ page.layout_name }}</td>
                            <td><code>{{ page.page_id }}</code></td>
                            <td><a href="/page/{{ page.page_id }}" target="_blank">ভিজিট লিংক</a></td>
                            <td>
                                <a href="/delete/{{ page.id }}" class="btn btn-danger btn-sm" onclick="return confirm('নিশ্চিত তো?')">ডিলিট</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
